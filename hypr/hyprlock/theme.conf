source = ~/.config/hypr/colors.conf

$font_family = Google Sans Flex
$font_family_clock = Google Sans Flex

general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
}

background {
    monitor =
    path = ~/.config/wallpaper.png
    color = $surface
    blur_passes = 3
    contrast = 1.0
    brightness = 0.9
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H")"
    color = $primary
    font_size = 200
    font_family = $font_family_clock Black
    position = 0, 180
    halign = center
    valign = center
    shadow_passes = 5
    shadow_size = 1
    shadow_color = rgba(0, 0, 0, 0.5)
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%M")"
    color = $primary
    font_size = 200
    font_family = $font_family_clock Black
    position = 0, -40
    halign = center
    valign = center
    shadow_passes = 5
    shadow_size = 1
    shadow_color = rgba(0, 0, 0, 0.5)
}

label {
  monitor =
  text = cmd[update:43200000] echo "$(date +"%A, %d %B")  |  󰁹 $USER"
  color = $onSurfaceVariant
  font_size = 18
  font_family = $font_family Medium
  position = 0, -220
  halign = center
  valign = center
}

input-field {
    monitor =
    size = 260, 64
    outline_thickness = 4
    dots_size = 0.25
    dots_spacing = 0.5
    dots_center = true
    
    outer_color = $primary
    inner_color = $surfaceContainer
    font_color = $text
    
    fade_on_empty = true
    placeholder_text = Password
    hide_input = false
    rounding = -1 
    
    check_color = $primaryContainer
    fail_color = $error
    
    position = 0, 100
    halign = center
    valign = bottom
}
